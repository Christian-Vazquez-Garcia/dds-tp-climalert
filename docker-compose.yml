
services:
  climalert-app:
    build: .
    container_name: climalert-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Sobreescribe localhost por el nombre del contenedor dentro de la red Docker
      - SPRING_MAIL_HOST=mailhog
    depends_on:
      - mailhog
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: climalert-mailhog
    ports:
      - "1025:1025" # Puerto SMTP
      - "8025:8025" # Interfaz Web
    restart: unless-stopped
